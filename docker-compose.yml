version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iboss_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api/v1
      - NODE_ENV=production
    networks:
      - iboss_network

networks:
  iboss_network:
    driver: bridge
